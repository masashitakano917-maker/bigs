<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>お問い合わせ | BIGSUM</title><link rel="stylesheet" href="./subpage.css"></head><body><div data-site-header></div><main><div class="breadcrumb"><a href="./index.html">TOP</a> / お問い合わせ</div><section class="page-hero"><p class="page-kicker">CONTACT</p><h1>まずは、お気軽にご相談ください。</h1><p>配送サービス、採用、宅配ボックスについて、内容を確認のうえ担当者よりご案内します。</p></section><section class="page-section"><div class="contact-grid"><aside class="contact-note"><h2>お問い合わせ前に</h2><p>営業日・返信目安・電話番号などの正式情報は、公開前にご入力ください。</p><p>お急ぎの配送相談は、希望日時・荷物量・集荷先・お届け先を添えるとスムーズです。</p></aside><form id="contact-form"><div class="form-row"><label for="type">お問い合わせ種別</label><select id="type" name="type" required><option value="">選択してください</option><option value="business">配送サービス</option><option value="recruit">採用について</option><option value="box">宅配ボックス</option><option value="other">その他</option></select></div><div class="form-row"><label for="name">お名前</label><input id="name" name="name" autocomplete="name" required></div><div class="form-row"><label for="email">メールアドレス</label><input id="email" name="email" type="email" autocomplete="email" required></div><div class="form-row"><label for="message">お問い合わせ内容</label><textarea id="message" name="message" required></textarea></div><label class="form-check"><input type="checkbox" required><span><a class="text-link" href="./privacy.html">プライバシーポリシー</a>に同意する</span></label><button class="black-button" type="submit">入力内容を確認 →</button><p class="form-message" id="form-message">入力内容を確認しました。現在はデザイン確認用のため、実送信先の設定後に送信機能が有効になります。</p></form></div></section></main><div data-site-footer></div><script src="./site.js"></script><script>const p=new URLSearchParams(location.search).get('type')||'';const s=document.querySelector('#type');if(p.startsWith('recruit'))s.value='recruit';else if(p.startsWith('box'))s.value='box';else if(['business','personal','spot','charter'].includes(p))s.value='business';document.querySelector('#contact-form').addEventListener('submit',e=>{e.preventDefault();document.querySelector('#form-message').classList.add('is-visible')})</script></body></html>
